name: iOS Build

# Two different jobs gated by a tag in the commit message, since a full signed IPA archive
# needs Apple signing secrets that may not be configured yet, while a plain compile check
# (does this even build?) doesn't need signing at all and is cheap to run on every push.
#
#   [ios-build]  -> compile-only, unsigned, builds for the iOS Simulator destination so no
#                   signing identity is needed. Fast feedback that the Swift/XcodeGen project
#                   at least compiles.
#   [ipa]        -> full signed archive + .ipa export, uploaded as a workflow artifact.
#                   Requires the signing secrets listed below to be configured in the repo;
#                   see the ios-ipa job for what's needed.

on:
  push:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode"
        required: true
        default: ios-build
        type: choice
        options:
          - ios-build
          - ipa

jobs:
  ios-build:
    name: Compile check (unsigned, simulator)
    if: |
      github.event_name == 'workflow_dispatch' && inputs.mode == 'ios-build' ||
      github.event_name == 'push' && contains(github.event.head_commit.message, '[ios-build]')
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init required submodule (libadb-android)
        run: git submodule update --init libadb-android

      # ZStream's SwiftUI code (TabBar.swift) uses iOS 26 APIs (GlassEffectContainer), which
      # needs a recent-enough Xcode/SDK to even compile the #available(iOS 26.0, *) branch --
      # hardcoding a specific Xcode version (e.g. 16.2) previously failed here because that
      # version's SDK predates iOS 26. Pick the newest Xcode actually installed on the runner
      # instead of guessing a version number that may not exist or may be too old.
      - name: Select newest available Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$latest" ]; then
            echo "::error::No /Applications/Xcode_*.app found on this runner."
            ls /Applications | grep -i xcode
            exit 1
          fi
          echo "Selecting $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version

      - name: Install XcodeGen and xcbeautify
        run: brew install xcodegen xcbeautify

      # The runner doesn't ship an iOS Simulator runtime pre-installed for every Xcode version,
      # which is why earlier attempts at a generic/placeholder simulator destination failed
      # ("no available devices matched the request") -- there was no iOS Simulator runtime at
      # all. Installing it explicitly, then creating one concrete simulator device to target.
      - name: Install iOS Simulator runtime
        run: xcodebuild -downloadPlatform iOS

      - name: Create a simulator device
        id: sim
        run: |
          runtime=$(xcrun simctl list runtimes available -j \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['runtimes']; ios=[r for r in d if r['platform']=='iOS']; print(ios[-1]['identifier'] if ios else '')")
          if [ -z "$runtime" ]; then
            echo "::error::No iOS Simulator runtime available after -downloadPlatform iOS."
            xcrun simctl list runtimes
            exit 1
          fi
          udid=$(xcrun simctl create ci-iphone "iPhone 16" "$runtime")
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build :shared XCFramework (debug)
        run: |
          chmod +x gradlew
          ./gradlew :shared:assembleSharedDebugXCFramework --stacktrace

      - name: Build for iOS Simulator (unsigned, no archive/export)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -project ZStream.xcodeproj \
            -scheme ZStream \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

  ipa:
    name: Archive + export signed IPA
    if: |
      github.event_name == 'workflow_dispatch' && inputs.mode == 'ipa' ||
      github.event_name == 'push' && contains(github.event.head_commit.message, '[ipa]')
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init required submodule (libadb-android)
        run: git submodule update --init libadb-android

      # ZStream's SwiftUI code (TabBar.swift) uses iOS 26 APIs (GlassEffectContainer), which
      # needs a recent-enough Xcode/SDK to even compile the #available(iOS 26.0, *) branch --
      # hardcoding a specific Xcode version (e.g. 16.2) previously failed here because that
      # version's SDK predates iOS 26. Pick the newest Xcode actually installed on the runner
      # instead of guessing a version number that may not exist or may be too old.
      - name: Select newest available Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$latest" ]; then
            echo "::error::No /Applications/Xcode_*.app found on this runner."
            ls /Applications | grep -i xcode
            exit 1
          fi
          echo "Selecting $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version

      - name: Install XcodeGen and xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build :shared XCFramework (release)
        run: |
          chmod +x gradlew
          ./gradlew :shared:assembleSharedReleaseXCFramework --stacktrace

      # Signing: imports a .p12 (base64-encoded cert+key) and a .mobileprovision into a
      # throwaway CI keychain, scoped to this job only -- nothing persists across runs.
      # Required repo secrets (Settings -> Secrets and variables -> Actions):
      #   IOS_P12_BASE64            base64 of the distribution .p12
      #   IOS_P12_PASSWORD          password the .p12 was exported with
      #   IOS_MOBILEPROVISION_BASE64  base64 of the .mobileprovision
      #   IOS_TEAM_ID               10-character Apple Developer Team ID
      # Until these are set, this job will fail at the "Check signing secrets" step with a
      # clear message rather than an opaque xcodebuild signing error.
      - name: Check signing secrets are configured
        run: |
          missing=()
          [ -z "${{ secrets.IOS_P12_BASE64 }}" ] && missing+=("IOS_P12_BASE64")
          [ -z "${{ secrets.IOS_P12_PASSWORD }}" ] && missing+=("IOS_P12_PASSWORD")
          [ -z "${{ secrets.IOS_MOBILEPROVISION_BASE64 }}" ] && missing+=("IOS_MOBILEPROVISION_BASE64")
          [ -z "${{ secrets.IOS_TEAM_ID }}" ] && missing+=("IOS_TEAM_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets for [ipa] builds: ${missing[*]}"
            echo "Configure these in repo Settings -> Secrets and variables -> Actions, or use the [ios-build] tag for an unsigned compile-only check instead."
            exit 1
          fi

      - name: Import signing certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ci-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "$PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$RUNNER_TEMP/profile.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Archive
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild archive \
            -project ZStream.xcodeproj \
            -scheme ZStream \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/ZStream.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            | xcbeautify --renderer github-actions

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/exportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ZStream.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ZStream-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
